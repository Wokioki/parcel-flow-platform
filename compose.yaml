name: parcel-flow-platform

services:
  identity-db:
    image: postgres:17-alpine
    container_name: parcel-flow-identity-db
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: identity_user
      POSTGRES_PASSWORD: identity_password
    ports:
      - "5433:5432"
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity_user -d identity_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  identity-db-data:
