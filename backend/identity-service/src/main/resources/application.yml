spring:
  application:
    name: identity-service

  datasource:
    url: jdbc:postgresql://localhost:5433/identity_db
    username: identity_user
    password: identity_password

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
